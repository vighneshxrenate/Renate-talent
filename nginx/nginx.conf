upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# Rate limiting zone: 10 req/s per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name renate.in www.renate.in;

    # Let certbot verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://renate.in$request_uri;
    }
}

# Redirect www -> non-www over HTTPS
server {
    listen 443 ssl;
    server_name www.renate.in;

    ssl_certificate /etc/letsencrypt/live/renate.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renate.in/privkey.pem;

    return 301 https://renate.in$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name renate.in;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/renate.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renate.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Request size limit (for PDF uploads)
    client_max_body_size 6M;

    # Root redirect -> /talent
    location = / {
        return 301 /talent;
    }

    # API routes -> backend
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts for file uploads
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # Frontend app (served under /talent and all subpaths including public assets)
    location /talent {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets (basePath prepends /talent to _next)
    location /talent/_next/static/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Block everything else
    location / {
        return 404;
    }
}
